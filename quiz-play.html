<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="THRIVE Quiz Arena — active quiz session.">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
  <meta name="robots" content="noindex">
  <link rel="canonical" href="https://trivefoundation.netlify.app/quiz-play.html">
  <title>Quiz in Progress — THRIVE</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <style>
    body{background:var(--off-white)}
    .q-page-header{position:sticky;top:0;background:var(--white);border-bottom:1px solid var(--border);padding:14px var(--pad);display:flex;align-items:center;justify-content:space-between;gap:10px;z-index:10;flex-wrap:wrap;box-shadow:var(--sh-xs)}
    .q-progress-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--surface-2)}
    .q-progress-fill{height:100%;background:var(--green-600);transition:width .35s ease}
    .q-timer{display:flex;align-items:center;gap:6px;font-family:var(--font-head);font-size:1rem;font-weight:700;color:var(--ink-900);padding:6px 13px;border-radius:var(--r-md);background:var(--surface-2);min-width:72px;justify-content:center}
    .q-timer.warning{background:var(--red-100);color:var(--red-600);animation:pulse-warn .8s ease-in-out infinite}
    @keyframes pulse-warn{0%,100%{opacity:1}50%{opacity:.6}}
    .q-body{max-width:680px;margin:0 auto;padding:clamp(28px,5vw,52px) var(--pad)}
    .q-number{font-size:.74rem;font-weight:600;color:var(--ink-300);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
    .q-text{font-family:var(--font-head);font-size:clamp(1.05rem,2.5vw,1.3rem);font-weight:700;color:var(--ink-900);line-height:1.4;margin-bottom:26px}
    .q-options{display:flex;flex-direction:column;gap:10px}
    .q-option{display:flex;align-items:flex-start;gap:13px;padding:15px 18px;border:2px solid var(--border);border-radius:var(--r-xl);background:var(--white);cursor:pointer;transition:all var(--t-fast);text-align:left;font-size:.95rem;color:var(--ink-700);line-height:1.5;width:100%}
    .q-option:hover:not(:disabled){border-color:var(--green-500);background:var(--green-50)}
    .q-option.selected{border-color:var(--green-600);background:var(--green-50)}
    .q-option.correct{border-color:#16A34A;background:#F0FDF4;color:#166534}
    .q-option.wrong{border-color:var(--red-600);background:var(--red-100);color:#991B1B}
    .q-option:disabled{cursor:default}
    .q-opt-letter{min-width:28px;height:28px;border-radius:50%;background:var(--surface-2);color:var(--ink-300);font-size:.76rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all var(--t-fast)}
    .q-option.selected .q-opt-letter{background:var(--green-600);color:#fff}
    .q-option.correct .q-opt-letter{background:#16A34A;color:#fff}
    .q-option.wrong .q-opt-letter{background:var(--red-600);color:#fff}
    .q-explanation{margin-top:14px;padding:13px 16px;border-radius:var(--r-lg);background:var(--teal-100);border-left:3px solid var(--teal-600);font-size:.87rem;color:var(--ink-700);line-height:1.65;display:none}
    .q-explanation.show{display:block}
    .q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:28px;gap:10px;flex-wrap:wrap}

    .results-screen{max-width:620px;margin:0 auto;padding:clamp(32px,5vw,60px) var(--pad)}
    .results-circle{width:110px;height:110px;border-radius:50%;border:5px solid var(--green-600);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 22px}
    .results-circle.fail{border-color:var(--orange-600)}
    .results-pct{font-family:var(--font-head);font-size:2rem;font-weight:800;color:var(--ink-900);line-height:1}
    .results-lbl{font-size:.68rem;color:var(--ink-300);text-transform:uppercase;letter-spacing:.08em}
    .results-breakdown{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:24px 0}
    .r-stat{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:15px 10px;text-align:center}
    .r-stat-n{font-family:var(--font-head);font-size:1.55rem;font-weight:800;color:var(--ink-900)}
    .r-stat-l{font-size:.7rem;color:var(--ink-300);margin-top:3px}
    .rank-banner{background:var(--ink-900);color:#fff;border-radius:var(--r-xl);padding:18px 22px;margin:16px 0;text-align:center}
    .rank-number{font-family:var(--font-head);font-size:2.2rem;font-weight:800;color:#FBBF24}
    .rank-label{font-size:.82rem;color:rgba(255,255,255,.6);margin-top:3px}

    .q-loading{max-width:480px;margin:80px auto;text-align:center;padding:0 var(--pad);color:var(--ink-300)}

    @media print{
      .q-page-header,.q-nav,.btn-no-print{display:none!important}
      .results-screen{max-width:100%;padding:20px}
    }
  </style>
</head>
<body>

<div class="q-page-header" id="q-header">
  <div style="display:flex;align-items:center;gap:10px">
    <button onclick="exitQuiz()" class="btn btn-ghost btn-sm btn-no-print" aria-label="Exit quiz">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
      Exit Quiz
    </button>
    <span id="q-quiz-title" style="font-weight:600;font-size:.88rem;color:var(--ink-900)"></span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <span id="q-counter" style="font-size:.8rem;color:var(--ink-300)"></span>
    <div class="q-timer" id="q-timer" aria-label="Time remaining" aria-live="polite">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span id="q-time-display">00:00</span>
    </div>
  </div>
  <div class="q-progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
    <div class="q-progress-fill" id="q-progress"></div>
  </div>
</div>

<main id="quiz-runner-content">
  <div class="q-loading">Loading your quiz…</div>
</main>

<div class="toast" role="alert" aria-live="polite"></div>
<script src="js/config.js"></script>
<script src="js/quiz-bank.js"></script>
<script src="js/main.js"></script>
<script>
'use strict';

const HANDOFF_KEY   = 'thrive_quiz_handoff_v1';
const QUIZ_LB_KEY    = 'thrive_v5_quiz_lb';
const QUIZ_STORE_KEY = 'thrive_v5_quizzes';
const SESSION_Q      = 50;

let state = {};
let timerInterval = null;

/* ── Option shuffle — fixes the "always answer B" integrity bug and gives
   every candidate (and every attempt) a different option order. Shuffled
   once when the session's question set is built; cached in state.questions
   so revisiting a question via Back shows the same order, not a re-shuffle. */
function shuffleQuestionOptions(q) {
  const idx = [0, 1, 2, 3];
  for (let i = idx.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [idx[i], idx[j]] = [idx[j], idx[i]];
  }
  return { ...q, options: idx.map(i => q.options[i]), answer: idx.indexOf(q.answer) };
}

function shuffle(arr) { return [...arr].sort(() => Math.random() - .5); }

function buildQuestionSet(allQuestions, target) {
  const shuffled = shuffle(Array.isArray(allQuestions) ? allQuestions : []);
  return shuffled.slice(0, Math.min(target, shuffled.length)).map(shuffleQuestionOptions);
}

function getTimerSeconds(quiz) {
  const tpq = (window.SITE_CONFIG?.QUIZ_SETTINGS?.timePerQuestion) || 30;
  return Math.min(quiz.sessionSize || SESSION_Q, quiz.questions.length) * tpq;
}

async function loadQuizList() {
  try {
    const r = await window.storage?.get(QUIZ_STORE_KEY);
    return r ? JSON.parse(r.value) : JSON.parse(JSON.stringify(window.SITE_CONFIG.QUIZZES || []));
  } catch {
    return JSON.parse(JSON.stringify(window.SITE_CONFIG.QUIZZES || []));
  }
}

async function init() {
  const params = new URLSearchParams(location.search);
  const quizId = params.get('quiz');

  let handoff = null;
  try { handoff = JSON.parse(sessionStorage.getItem(HANDOFF_KEY) || 'null'); } catch {}
  sessionStorage.removeItem(HANDOFF_KEY); // one-time use — direct/refreshed access can't replay it

  if (!quizId || !handoff || handoff.quizId !== quizId || !handoff.name) {
    location.href = 'quiz.html';
    return;
  }

  const quizzes = await loadQuizList();
  const quiz = quizzes.find(q => q.id === quizId);
  if (!quiz) {
    document.getElementById('quiz-runner-content').innerHTML = `<div class="q-loading">Quiz not found. <a href="quiz.html">Back to quizzes →</a></div>`;
    return;
  }

  const selected = buildQuestionSet(quiz.questions, quiz.sessionSize || SESSION_Q);
  state = {
    quiz, questions: selected, current: 0,
    answers:  new Array(selected.length).fill(null),
    answered: new Array(selected.length).fill(false),
    timeLeft: getTimerSeconds(quiz),
    finished: false,
    playerName: handoff.name,
  };

  document.getElementById('q-quiz-title').textContent = quiz.title;
  document.getElementById('quiz-runner-content').innerHTML = buildRunnerHTML();
  renderQuestion();
  startTimer();
}

function buildRunnerHTML() {
  return `<div class="q-body" id="q-body">
    <div class="q-number" id="q-number"></div>
    <p class="q-text" id="q-text"></p>
    <div class="q-options" id="q-options" role="radiogroup" aria-labelledby="q-text"></div>
    <div class="q-explanation" id="q-explanation" role="note"></div>
    <div class="q-nav">
      <button class="btn btn-ghost btn-sm btn-no-print" id="q-prev" onclick="prevQ()">← Back</button>
      <button class="btn btn-primary btn-sm btn-no-print" id="q-next" onclick="nextQ()">Next →</button>
    </div>
  </div>`;
}

function renderQuestion() {
  const { questions, current, answers, answered } = state;
  const q       = questions[current];
  const total   = questions.length;
  const pct     = Math.round((current / total) * 100);
  const LETTERS = ['A','B','C','D'];

  document.getElementById('q-number').textContent = `Question ${current + 1} of ${total}`;
  document.getElementById('q-text').textContent   = q.q;
  document.getElementById('q-counter').textContent = `${current + 1} / ${total}`;
  document.getElementById('q-progress').style.width = pct + '%';
  document.getElementById('q-progress').parentElement.setAttribute('aria-valuenow', pct);

  document.getElementById('q-options').innerHTML = q.options.map((opt, i) => {
    let cls = '';
    if (answered[current]) {
      if (i === q.answer) cls = 'correct';
      else if (i === answers[current]) cls = 'wrong';
    } else if (i === answers[current]) cls = 'selected';
    return `<button class="q-option ${cls}" ${answered[current] ? 'disabled' : ''}
      onclick="selectOption(${i})" role="radio" aria-checked="${i === answers[current]}"
      aria-label="Option ${LETTERS[i]}: ${sanitize(opt)}">
      <span class="q-opt-letter" aria-hidden="true">${LETTERS[i]}</span>
      <span>${sanitize(opt)}</span>
    </button>`;
  }).join('');

  const expEl = document.getElementById('q-explanation');
  if (answered[current] && q.explanation && window.SITE_CONFIG?.QUIZ_SETTINGS?.showExplanations) {
    expEl.textContent = q.explanation; expEl.classList.add('show');
  } else { expEl.classList.remove('show'); }

  const prevBtn = document.getElementById('q-prev');
  const nextBtn = document.getElementById('q-next');
  if (prevBtn) prevBtn.style.visibility = current === 0 ? 'hidden' : 'visible';
  if (nextBtn) {
    const isLast = current === total - 1;
    nextBtn.textContent = (isLast && answered[current]) ? 'Finish Quiz ✓' : answered[current] ? 'Next →' : 'Skip →';
  }
}

function selectOption(i) {
  if (state.answered[state.current]) return;
  state.answers[state.current]  = i;
  state.answered[state.current] = true;
  renderQuestion();
}
function nextQ() { if (state.current === state.questions.length - 1) { finishQuiz(); return; } state.current++; renderQuestion(); }
function prevQ() { if (state.current > 0) { state.current--; renderQuestion(); } }
window.selectOption = selectOption; window.nextQ = nextQ; window.prevQ = prevQ;

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    state.timeLeft--;
    const m = Math.floor(state.timeLeft / 60);
    const s = state.timeLeft % 60;
    document.getElementById('q-time-display').textContent = `${m}:${String(s).padStart(2,'0')}`;
    document.getElementById('q-timer').classList.toggle('warning', state.timeLeft <= 60);
    if (state.timeLeft <= 0) { clearInterval(timerInterval); finishQuiz(true); }
  }, 1000);
}

async function finishQuiz(timeout = false) {
  clearInterval(timerInterval);
  state.finished = true;
  const { questions, answers, answered, quiz, playerName } = state;
  const correct   = questions.filter((q, i) => answered[i] && answers[i] === q.answer).length;
  const total     = questions.length;
  const pct       = Math.round((correct / total) * 100);
  const passed    = pct >= (window.SITE_CONFIG?.QUIZ_SETTINGS?.passMark || 50);
  const totalSecs = getTimerSeconds(quiz);
  const timeTaken = totalSecs - state.timeLeft;
  const skipped   = answered.filter(a => !a).length;
  const wrong     = total - correct - skipped;

  const rank = await saveScore(quiz.id, playerName, pct, correct, total, timeTaken);
  try { sessionStorage.setItem('thrive_last_score_v1', JSON.stringify({ quizId: quiz.id, name: playerName, pct })); } catch {}

  document.getElementById('q-header').style.display = 'none';
  document.getElementById('quiz-runner-content').innerHTML = `
    <div class="results-screen">
      <div style="text-align:center;margin-bottom:20px">
        <img src="assets/tree-logo.png" alt="THRIVE" style="height:44px;margin:0 auto 8px" onerror="this.style.display='none'">
        <div style="font-weight:700;color:var(--ink-900)">${sanitize((window.SITE_CONFIG?.ORG_NAME)||'THRIVE')}</div>
        <div style="font-size:.78rem;color:var(--ink-300)">${sanitize(quiz.title)} · ${new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}</div>
      </div>
      <div class="results-circle ${passed ? '' : 'fail'}">
        <span class="results-pct">${pct}%</span>
        <span class="results-lbl">${passed ? 'Pass' : 'Try again'}</span>
      </div>
      <h2 style="font-size:clamp(1.3rem,3vw,1.8rem);text-align:center;margin-bottom:.5rem">${passed ? 'Well done, ' + sanitize(playerName) + '!' : 'Keep practising!'}</h2>
      <p style="color:var(--ink-500);text-align:center">
        ${timeout ? 'Time ran out. ' : ''}You answered <strong>${correct} of ${total}</strong> questions correctly.
      </p>
      ${!passed ? `<p style="color:var(--ink-300);font-size:.86rem;text-align:center;margin-top:.4rem">You need ${window.SITE_CONFIG?.QUIZ_SETTINGS?.passMark||50}% to pass.</p>` : ''}
      <div class="results-breakdown">
        <div class="r-stat"><div class="r-stat-n" style="color:var(--green-600)">${correct}</div><div class="r-stat-l">Correct</div></div>
        <div class="r-stat"><div class="r-stat-n" style="color:var(--red-600)">${wrong}</div><div class="r-stat-l">Wrong</div></div>
        <div class="r-stat"><div class="r-stat-n" style="color:var(--orange-600)">${skipped}</div><div class="r-stat-l">Skipped</div></div>
      </div>
      <div class="r-stat" style="max-width:200px;margin:0 auto 16px">
        <div class="r-stat-n">${Math.floor(timeTaken/60)}m ${timeTaken%60}s</div>
        <div class="r-stat-l">Time taken</div>
      </div>
      ${rank ? `<div class="rank-banner"><div class="rank-number">#${rank}</div><div class="rank-label">Your ranking on the ${sanitize(quiz.title)} leaderboard</div></div>` : ''}
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px" class="btn-no-print">
        <a href="quiz.html" class="btn btn-primary btn-sm">← Back to Quizzes</a>
        <button class="btn btn-teal btn-sm" onclick="window.print()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print Result
        </button>
      </div>
    </div>`;
}

function exitQuiz() {
  if (state.finished) { location.href = 'quiz.html'; return; }
  if (!confirm('Exit this quiz? Your progress will not be saved, and your access code has already been used.')) return;
  state.finished = true; // suppress the beforeunload prompt for this deliberate exit
  clearInterval(timerInterval);
  location.href = 'quiz.html';
}
window.exitQuiz = exitQuiz;

window.addEventListener('beforeunload', (e) => {
  if (state.questions && !state.finished) {
    e.preventDefault();
    e.returnValue = '';
  }
});

/* ── Leaderboard (write-only here — quiz.html shows the table) ── */
async function loadScores() {
  try { const r = await window.storage?.get(QUIZ_LB_KEY); return r ? JSON.parse(r.value) : {}; }
  catch { return {}; }
}
async function saveScore(quizId, name, pct, correct, total, timeTaken) {
  const scores = await loadScores();
  if (!scores[quizId]) scores[quizId] = [];
  const entry = {
    name:      String(name || 'Anonymous').trim().slice(0, 60),
    pct:       Math.max(0, Math.min(100, Number(pct) || 0)),
    correct:   Math.max(0, Math.min(Number(total) || 0, Number(correct) || 0)),
    total:     Math.max(1, Number(total) || 1),
    timeTaken: Math.max(0, Number(timeTaken) || 0),
    date:      new Date().toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }),
  };
  scores[quizId].push(entry);
  scores[quizId].sort((a, b) => b.pct - a.pct || a.timeTaken - b.timeTaken);
  scores[quizId] = scores[quizId].slice(0, 50);
  try { await window.storage?.set(QUIZ_LB_KEY, JSON.stringify(scores)); } catch {}
  return scores[quizId].findIndex(e => e.name === entry.name && e.pct === entry.pct) + 1;
}

init();
</script>
</body>
</html>
