<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
  <title>Videos — TriveFoundation</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <style>
    .video-card video,.video-card iframe{width:100%;max-height:230px;display:block;border-radius:var(--r-lg) var(--r-lg) 0 0;background:#000}
    .video-card-body{padding:13px 15px}
    .video-title{font-weight:600;font-size:.92rem;color:var(--c-dark);font-family:var(--fd)}
    .video-date{font-size:.74rem;color:var(--c-muted);margin-top:3px}
    .upload-zone{border:2px dashed var(--c-border);border-radius:var(--r-lg);padding:clamp(28px,5vw,48px) 20px;text-align:center;cursor:pointer;transition:all var(--t);background:var(--c-cream)}
    .upload-zone:hover,.upload-zone.drag{border-color:var(--c-teal);background:rgba(13,123,123,.05)}
    .upload-icon{width:52px;height:52px;border-radius:50%;background:rgba(13,123,123,.12);display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
    progress{width:100%;height:6px;appearance:none;border-radius:3px;overflow:hidden;margin-top:10px}
    progress::-webkit-progress-bar{background:var(--c-sand);border-radius:3px}
    progress::-webkit-progress-value{background:var(--c-teal);border-radius:3px}
    #upload-progress{display:none}
  </style>
</head>
<body>
<header class="nav" role="banner"></header>
<main>
<section class="page-hdr">
  <span class="eyebrow" style="color:var(--c-green-lt);display:block;margin-bottom:.4rem">Media</span>
  <h1 data-cms="videos_title">TriveFoundation Videos</h1>
  <p class="lead" style="margin-top:.5rem;max-width:500px" data-cms="videos_sub">Watch highlights, event recordings, and inspiration from our programmes.</p>
</section>

<!-- UPLOAD (admin only) -->
<section class="section-sm admin-only" id="upload-section" style="background:var(--c-sand)">
  <div class="container">
    <h3 style="margin-bottom:16px;font-size:1rem">Upload a Video</h3>
    <div class="fg" style="max-width:400px;margin-bottom:12px">
      <label>Video Title</label>
      <input type="text" id="video-title-input" placeholder="e.g. Boys Final — TriveFoundation 2025" maxlength="80">
    </div>
    <div class="upload-zone" id="upload-zone" onclick="document.getElementById('video-file').click()" role="button" tabindex="0" aria-label="Click to upload video">
      <input type="file" id="video-file" accept="video/mp4,video/webm,video/ogg,video/quicktime" aria-label="Choose video file">
      <div class="upload-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--c-teal)" stroke-width="2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg></div>
      <p style="color:var(--c-dark);font-weight:600;margin-bottom:4px">Click or drag to upload</p>
      <p style="font-size:.82rem;color:var(--c-muted)">MP4, WebM, MOV — max 200 MB</p>
    </div>
    <div id="upload-progress"><progress id="upload-bar" value="0" max="100"></progress><p id="upload-msg" style="font-size:.82rem;color:var(--c-muted);margin-top:5px"></p></div>
  </div>
</section>

<section class="section" style="background:var(--c-white)">
  <div class="container">
    <div class="text-center fade-up" style="margin-bottom:clamp(18px,3vw,28px)">
      <span class="eyebrow">All Videos</span>
      <h2 style="margin-top:.3rem" data-cms="videos_all_title">Programme Recordings</h2>
    </div>
    <div class="video-grid" id="video-grid"></div>
  </div>
</section>
</main>
<div class="site-footer"></div>
<div class="toast" role="alert" aria-live="polite"></div>
<script src="js/config.js"></script>
<script src="js/components.js"></script>
<script src="js/main.js"></script>
<script>
'use strict';
injectNav();
injectAdminUI();injectFooter();

function renderVideos(){
  const vids=VideoEngine.get();
  const grid=document.getElementById('video-grid');if(!grid)return;
  if(!vids.length){
    grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:56px 20px;color:var(--c-muted)">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 12px;display:block;opacity:.35"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>
      <p>No videos yet. ${AdminAuth.isLoggedIn()?'Upload your first video above.':'Check back soon!'}</p>
    </div>`;
    return;
  }
  grid.innerHTML=vids.map((v,i)=>`<div class="act-card">
    <video src="${v.dataUrl}" type="${sanitize(v.type)}" controls preload="metadata" aria-label="${sanitize(v.title)}"></video>
    <div class="video-card-body">
      <div class="video-title">${sanitize(v.title)}</div>
      <div class="video-date">${sanitize(v.date)}</div>
      ${AdminAuth.isLoggedIn()?`<button class="btn-del-item" onclick="delVideo(${i})" style="margin-top:8px">Remove video</button>`:''}
    </div>
  </div>`).join('');
}

function delVideo(idx){
  if(!confirm('Remove this video?'))return;
  VideoEngine.remove(idx);renderVideos();showToast('Video removed');
}
window.delVideo=delVideo;

/* Upload handler */
const zone=document.getElementById('upload-zone');
const fileInput=document.getElementById('video-file');
const progressWrap=document.getElementById('upload-progress');
const progressBar=document.getElementById('upload-bar');
const progressMsg=document.getElementById('upload-msg');

function handleFile(file){
  if(!file)return;
  const MAX=200*1024*1024;
  if(file.size>MAX){showToast('File too large — max 200 MB','err');return;}
  const title=document.getElementById('video-title-input').value.trim()||file.name.replace(/\.[^.]+$/,'');
  progressWrap.style.display='block';
  progressBar.value=0;progressMsg.textContent='Reading file…';
  const reader=new FileReader();
  reader.onprogress=e=>{if(e.lengthComputable){progressBar.value=Math.round(e.loaded/e.total*90);progressMsg.textContent=`Loading… ${Math.round(e.loaded/e.total*90)}%`;}};
  reader.onload=e=>{
    progressBar.value=100;progressMsg.textContent='Saving…';
    VideoEngine.add(title,e.target.result,file.type);
    setTimeout(()=>{
      progressWrap.style.display='none';
      document.getElementById('video-title-input').value='';
      renderVideos();showToast('Video uploaded!','ok');
    },600);
  };
  reader.onerror=()=>showToast('Failed to read file','err');
  reader.readAsDataURL(file);
}

if(fileInput)fileInput.addEventListener('change',e=>handleFile(e.target.files[0]));
if(zone){
  zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag');});
  zone.addEventListener('dragleave',()=>zone.classList.remove('drag'));
  zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('drag');handleFile(e.dataTransfer.files[0]);});
  zone.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')fileInput?.click();});
}

async function init(){
  await VideoEngine.load();
  await CMS.load();CMS.apply();
  renderVideos();
  if(AdminAuth.isLoggedIn())document.querySelectorAll('.admin-only').forEach(el=>el.style.display='block');
}
init();
</script>
</body>
</html>
